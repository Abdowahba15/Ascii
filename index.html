<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Art Converter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cairo:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #00ff88;
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }

  h1 {
    font-size: 2rem;
    letter-spacing: 4px;
    margin-bottom: 6px;
    text-shadow: 0 0 20px #00ff88aa;
  }

  .sub {
    color: #444;
    font-size: 0.85rem;
    margin-bottom: 30px;
    font-family: 'Share Tech Mono', monospace;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 20px;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 800px;
  }

  label.upload-btn {
    background: #111;
    border: 1px solid #00ff88;
    color: #00ff88;
    padding: 10px 22px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  label.upload-btn:hover { background: #00ff8822; box-shadow: 0 0 12px #00ff8866; }

  input[type=file] { display: none; }

  .slider-group {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #888;
    font-size: 0.82rem;
    font-family: 'Share Tech Mono', monospace;
  }

  input[type=range] {
    accent-color: #00ff88;
    width: 100px;
  }

  select {
    background: #111;
    border: 1px solid #333;
    color: #00ff88;
    padding: 6px 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
  }

  button {
    background: #00ff88;
    color: #000;
    border: none;
    padding: 10px 22px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
  }
  button:hover { background: #00ffaa; box-shadow: 0 0 16px #00ff8888; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  .workspace {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 1100px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .panel {
    background: #0e0e0e;
    border: 1px solid #1a1a1a;
    padding: 14px;
    flex: 1;
    min-width: 260px;
  }

  .panel-title {
    font-size: 0.72rem;
    color: #444;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 3px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  canvas { display: none; }

  #preview-img {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    display: block;
    filter: grayscale(100%);
    opacity: 0.85;
  }

  #ascii-output {
    font-family: 'Share Tech Mono', monospace;
    font-size: 6px;
    line-height: 1.1;
    white-space: pre;
    color: #00ff88;
    overflow: auto;
    max-height: 500px;
    background: #000;
    padding: 10px;
    text-shadow: 0 0 3px #00ff8866;
    word-break: break-all;
  }

  .copy-btn {
    margin-top: 10px;
    width: 100%;
    background: #111;
    color: #00ff88;
    border: 1px solid #00ff8844;
    font-size: 0.78rem;
  }
  .copy-btn:hover { background: #00ff8811; }

  .drop-zone {
    border: 2px dashed #1e1e1e;
    padding: 40px;
    text-align: center;
    color: #333;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    transition: all 0.2s;
    cursor: pointer;
  }
  .drop-zone.over { border-color: #00ff88; color: #00ff88; background: #00ff8808; }

  #status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    color: #555;
    margin-top: 8px;
    min-height: 18px;
  }
</style>
</head>
<body>

<h1>ASCII CONVERTER</h1>
<p class="sub">// image → text art //</p>

<div class="controls">
  <label class="upload-btn" for="file-input">📁 اختار صورة</label>
  <input type="file" id="file-input" accept="image/*">

  <div class="slider-group">
    عرض:
    <input type="range" id="width-slider" min="40" max="200" value="100">
    <span id="width-val">100</span>
  </div>

  <div class="slider-group">
    تباين:
    <input type="range" id="contrast-slider" min="0" max="100" value="20">
    <span id="contrast-val">20</span>
  </div>

  <select id="charset">
    <option value="detailed">تفصيلي</option>
    <option value="simple">بسيط</option>
    <option value="blocks">مربعات</option>
    <option value="dots">نقاط</option>
  </select>

  <button id="convert-btn" disabled>تحويل</button>
</div>

<p id="status">في انتظار صورة...</p>

<div class="workspace">
  <div class="panel" id="preview-panel">
    <div class="panel-title">// PREVIEW</div>
    <label for="file-input">
      <div class="drop-zone" id="drop-zone">اسحب صورة هنا أو اضغط للاختيار</div>
    </label>
    <img id="preview-img" style="display:none">
  </div>

  <div class="panel" id="output-panel">
    <div class="panel-title">// ASCII OUTPUT</div>
    <pre id="ascii-output">ابدأ باختيار صورة...</pre>
    <button class="copy-btn" onclick="copyAscii()">📋 نسخ النص</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
const CHARSETS = {
  detailed: ' .\'`^",:;Il!i><~+_-?][}{1)(|/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$',
  simple:   ' .:-=+*#%@',
  blocks:   ' ░▒▓█',
  dots:     ' ·•●'
};

let imgLoaded = false;
const fileInput = document.getElementById('file-input');
const previewImg = document.getElementById('preview-img');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const asciiOut = document.getElementById('ascii-output');
const convertBtn = document.getElementById('convert-btn');
const widthSlider = document.getElementById('width-slider');
const widthVal = document.getElementById('width-val');
const contrastSlider = document.getElementById('contrast-slider');
const contrastVal = document.getElementById('contrast-val');
const status = document.getElementById('status');
const dropZone = document.getElementById('drop-zone');

widthSlider.oninput = () => widthVal.textContent = widthSlider.value;
contrastSlider.oninput = () => contrastVal.textContent = contrastSlider.value;

fileInput.onchange = e => loadFile(e.target.files[0]);

dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('over'); };
dropZone.ondragleave = () => dropZone.classList.remove('over');
dropZone.ondrop = e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  loadFile(e.dataTransfer.files[0]);
};

function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    previewImg.src = ev.target.result;
    previewImg.style.display = 'block';
    dropZone.style.display = 'none';
    imgLoaded = true;
    convertBtn.disabled = false;
    status.textContent = `✓ ${file.name} — جاهز للتحويل`;
  };
  reader.readAsDataURL(file);
}

convertBtn.onclick = convert;

function applyContrast(value, contrast) {
  const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
  return Math.min(255, Math.max(0, factor * (value - 128) + 128));
}

function convert() {
  if (!imgLoaded) return;
  status.textContent = 'جاري التحويل...';

  const img = new Image();
  img.src = previewImg.src;
  img.onload = () => {
    const targetW = parseInt(widthSlider.value);
    const aspectRatio = img.height / img.width;
    const targetH = Math.round(targetW * aspectRatio * 0.45);

    canvas.width = targetW;
    canvas.height = targetH;
    ctx.drawImage(img, 0, 0, targetW, targetH);

    const imageData = ctx.getImageData(0, 0, targetW, targetH);
    const data = imageData.data;
    const contrastAmount = parseInt(contrastSlider.value) * 2.55;
    const chars = CHARSETS[document.getElementById('charset').value];

    let result = '';
    for (let y = 0; y < targetH; y++) {
      for (let x = 0; x < targetW; x++) {
        const i = (y * targetW + x) * 4;
        let r = data[i], g = data[i+1], b = data[i+2];
        r = applyContrast(r, contrastAmount);
        g = applyContrast(g, contrastAmount);
        b = applyContrast(b, contrastAmount);
        const brightness = 0.299*r + 0.587*g + 0.114*b;
        const charIdx = Math.floor((brightness / 255) * (chars.length - 1));
        result += chars[charIdx];
      }
      result += '\n';
    }

    asciiOut.textContent = result;
    status.textContent = `✓ تم! ${targetW}×${targetH} حرف`;
  };
}

function copyAscii() {
  navigator.clipboard.writeText(asciiOut.textContent)
    .then(() => { status.textContent = '✓ تم النسخ!'; setTimeout(() => status.textContent = '', 2000); })
    .catch(() => status.textContent = '✗ فشل النسخ');
}
</script>
</body>
</html>
